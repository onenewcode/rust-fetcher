name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-bundles:
    name: Build Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            bundle_command: dx bundle --package-types dmg --release
          - os: windows-latest
            platform: windows
            bundle_command: dx bundle --package-types msi --package-types nsis --release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Build and Bundle
        working-directory: crates/desktop
        run: ${{ matrix.bundle_command }}

      - name: Prepare Release Assets
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p dist
          if [ "${{ matrix.platform }}" = "macos" ]; then
            DMG=$(find target/dx -name "*.dmg" -print -quit)
            if [ -z "$DMG" ] || [ ! -f "$DMG" ]; then
              echo "No macOS dmg found in target/dx."
              exit 1
            fi
            cp "$DMG" "dist/fetcher-desktop-v${VERSION}-macos.dmg"
          else
            MSI=$(find target/dx -name "*.msi" -print -quit)
            if [ -z "$MSI" ] || [ ! -f "$MSI" ]; then
              echo "No Windows msi found in target/dx."
              exit 1
            fi
            cp "$MSI" "dist/fetcher-desktop-v${VERSION}-windows.msi"

            EXE=$(find target/dx -name "*-setup.exe" -not -path "*/deps/*" -print -quit)
            if [ -z "$EXE" ] || [ ! -f "$EXE" ]; then
              echo "No Windows setup exe found in target/dx."
              exit 1
            fi
            cp "$EXE" "dist/fetcher-desktop-v${VERSION}-windows-setup.exe"
          fi

      - name: Generate artifact attestation
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest@v4
        with:
          subject-path: dist/*

      - name: Skip artifact attestation for private repositories
        if: ${{ github.event.repository.private }}
        shell: bash
        run: |
          echo "Skipping artifact attestation because this repository is private."
          echo "GitHub artifact attestations are available for public repositories on GitHub Free."

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-bundles
    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Show release assets
        shell: bash
        run: ls -lah dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.msi
            dist/*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
